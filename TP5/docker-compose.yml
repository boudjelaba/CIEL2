#version: "3.9"

services:
  flask_api:
    build: .
    ports:
      - "5011:5011"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: students_db
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - frontend
      - backend

  postgres_db:
    image: postgres:15
    # Cette partie est exclusivement réservée pour voir le trafic sous Wireshark
    #ports:
      #- "5432:5432"
    # -------------
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: students_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d students_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  pgdata:

networks:
  frontend:
  backend: